            <div className="result-grid">
              <div className="result-item">
                <div className="ri-label">Theoretical Dose</div>
                <div className="ri-value">{fmt(result.vitA_g,2)}<span className="ri-unit">g</span></div>
              </div>
              <div className="result-item" style={{border:'1px solid rgba(245,166,35,.3)'}}>
                <div className="ri-label">Recommended (+10% excess)</div>
                <div className="ri-value" style={{color:'var(--accent)'}}>{fmt(result.vitA_g_excess,2)}<span className="ri-unit">g</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Total IU Added</div>
                <div className="ri-value">{fmt(result.total_IU/1e6,3)}<span className="ri-unit">M IU</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Oil Mass Treated</div>
                <div className="ri-value">{fmt(result.oil_kg,1)}<span className="ri-unit">kg</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Final Concentration</div>
                <div className="ri-value">{result.target}<span className="ri-unit">IU/g</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">NAFDAC Min (11 IU/g)</div>
                <div className="ri-value" style={{color:result.isCompliant?'var(--green)':'var(--red)',fontSize:14}}>
                  {result.isCompliant?'✓ Pass':'✗ Fail'}
                </div>
              </div>
            </div>
            {!result.isCompliant && (
              <div className="alert alert-danger" style={{marginBottom:12}}>
                <span className="alert-icon">✕</span>
                Target concentration {result.target} IU/g is below the NAFDAC minimum of 11 IU/g. Increase target concentration before submission.
              </div>
            )}
            {submitted
              ? <div className="alert alert-success"><span className="alert-icon">✓</span>Submitted for approval.</div>
              : <button className="btn btn-primary" onClick={submit} disabled={!result.isCompliant}>Submit for Approval</button>
            }
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   COST DASHBOARD
══════════════════════════════════════════════════════════ */
function CostDashboard({ inflationRate, marginAbove, batches }) {
  const [oilVol, setOilVol]     = useState('10000');
  const [oilCost, setOilCost]   = useState('650');
  const [naohCost, setNaohCost] = useState('1200');
  const [acidCost, setAcidCost] = useState('3500');
  const [vitACost, setVitACost] = useState('85000');
  const [laborCost, setLaborCost] = useState('80000');
  const [energyCost, setEnergyCost] = useState('45000');
  const [packCost, setPackCost] = useState('35000');

  const vol   = parseFloat(oilVol)||0;
  const raw   = vol * parseFloat(oilCost) / 1000;
  const chem  = (vol/1000) * (parseFloat(naohCost)*7.5 + parseFloat(acidCost)*0.025 + parseFloat(vitACost)*0.0201);
  const labor = parseFloat(laborCost)||0;
  const energy= parseFloat(energyCost)||0;
  const pack  = parseFloat(packCost)||0;
  const total = raw + chem + labor + energy + pack;
  const exFac = vol > 0 ? total / vol : 0;
  const effMgn = (inflationRate + marginAbove) / 100;
  const wholesale = exFac * (1 + effMgn);
  const retail    = wholesale * 1.15;
  const profit_per_l = wholesale - exFac;
  const total_profit = profit_per_l * vol;

  const items = [
    ['Raw Material (Oil)', raw],
    ['Chemicals', chem],
    ['Labour', labor],
    ['Energy / Utilities', energy],
    ['Packaging', pack],
  ];
  const maxCost = Math.max(...items.map(i=>i[1]), 1);

  return (
    <div>
      <div className="page-heading mb-4">Production Cost Analysis</div>
      <div className="page-sub mb-16">Ex-factory costing, wholesale & retail pricing chain based on CEO-set inflation parameters</div>

      <div className="alert alert-info mb-16">
        <span className="alert-icon">ℹ</span>
        Current margin formula: Inflation {inflationRate}% + Margin {marginAbove}% = <strong>{inflationRate+marginAbove}%</strong> above ex-factory price. Adjust in Approval Queue → Inflation Settings (Director+).
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="section-title">Cost Inputs — per batch</div>
          <div className="form-grid cols-2">
            <div className="field"><label>Oil Volume (L)</label><input type="number" value={oilVol} onChange={e=>setOilVol(e.target.value)}/></div>
            <div className="field"><label>Oil Cost (₦/L)</label><input type="number" value={oilCost} onChange={e=>setOilCost(e.target.value)}/></div>
            <div className="field"><label>NaOH (₦/kg)</label><input type="number" value={naohCost} onChange={e=>setNaohCost(e.target.value)}/></div>
            <div className="field"><label>Phosphoric Acid (₦/L)</label><input type="number" value={acidCost} onChange={e=>setAcidCost(e.target.value)}/></div>
            <div className="field"><label>Vitamin A Conc. (₦/kg)</label><input type="number" value={vitACost} onChange={e=>setVitACost(e.target.value)}/></div>
            <div className="field"><label>Labour (₦ flat)</label><input type="number" value={laborCost} onChange={e=>setLaborCost(e.target.value)}/></div>
            <div className="field"><label>Energy (₦ flat)</label><input type="number" value={energyCost} onChange={e=>setEnergyCost(e.target.value)}/></div>
            <div className="field"><label>Packaging (₦ flat)</label><input type="number" value={packCost} onChange={e=>setPackCost(e.target.value)}/></div>
          </div>
        </div>

        <div className="card">
          <div className="section-title">Cost Breakdown</div>
          <div className="bar-chart mb-12">
            {items.map(([l,v])=>(
              <div key={l} className="bar-col">
                <div className="bar-value">{fmtCur(v)}</div>
                <div className="bar-fill" style={{height:`${(v/maxCost)*80}px`,background:'var(--accent)',opacity:.8}}/>
                <div className="bar-label">{l.split(' ')[0]}</div>
              </div>
            ))}
          </div>
          {items.map(([l,v])=>(
            <div key={l} className="inline-info">
              <span className="ii-label">{l}</span>
              <span className="ii-value">{fmtCur(v)}</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:10,padding:'10px 0',borderTop:'1px solid var(--accent)',color:'var(--accent)',fontWeight:500}}>
            <span>Total Production Cost</span>
            <span className="mono">{fmtCur(total)}</span>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="section-title">Pricing Chain — Inflation-Adjusted</div>
        <div className="price-chain">
          {[
            ['Ex-Factory', exFac, 'per litre', ''],
            ['→','','','arrow'],
            ['Wholesale', wholesale, `+${inflationRate+marginAbove}% margin`, ''],
            ['→','','','arrow'],
            ['Retail', retail, '+15% retail mark-up', ''],
          ].map((item,i)=>
            item[3]==='arrow'
              ? <div key={i} className="pc-arrow">→</div>
              : (
                <div key={i} className="pc-item" style={item[0]==='Wholesale'?{background:'rgba(245,166,35,.05)'}:{}}>
                  <div className="pc-item-label">{item[0]}</div>
                  <div className="pc-item-value">₦{fmt(item[1] as number,2)}</div>
                  <div className="pc-item-sub">{item[2]}</div>
                </div>
              )
          )}
        </div>
        <div className="metrics-row cols-3" style={{marginBottom:0,marginTop:12}}>
          <div className="metric-card green">
            <div className="metric-label">Profit per Litre</div>
            <div className="metric-value" style={{fontSize:20}}>₦{fmt(profit_per_l,2)}</div>
          </div>
          <div className="metric-card green">
            <div className="metric-label">Total Batch Profit</div>
            <div className="metric-value" style={{fontSize:20}}>{fmtCur(total_profit)}</div>
            <div className="metric-sub">{fmtN(vol)}L batch</div>
          </div>
          <div className="metric-card accent">
            <div className="metric-label">Effective Margin</div>
            <div className="metric-value" style={{fontSize:20}}>{inflationRate+marginAbove}%</div>
            <div className="metric-sub">Inflation {inflationRate}% + Margin {marginAbove}%</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   APPROVAL QUEUE
══════════════════════════════════════════════════════════ */
function ApprovalQueue({ user, batches, setBatches, inventory, setInventory, addAudit, showToast, inflationRate, setInflationRate, marginAbove, setMarginAbove }) {
  const [rejectId, setRejectId]     = useState(null);
  const [rejectReason, setRejectReason] = useState('');
  const [showInflation, setShowInflation] = useState(false);
  const [tempInfl, setTempInfl]     = useState(inflationRate);
  const [tempMargin, setTempMargin] = useState(marginAbove);
  const [activeTab, setActiveTab]   = useState('pending');

  const canApprove = user.role==='superadmin' || user.role==='admin' || canByPosition(user,'Manager');
  const canInflation = user.role==='superadmin' || user.role==='admin' || canByPosition(user,'Director');

  const pending  = batches.filter(b=>b.status==='pending');
  const approved = batches.filter(b=>b.status==='approved');
  const rejected = batches.filter(b=>b.status==='rejected');

  const deductInventory = (batch) => {
    const chemMap = { NaOH:'NaOH (Caustic Soda)', Phosphoric:'Phosphoric Acid (85%)', VitaminA:'Vitamin A Concentrate' };
    const chem = chemMap[batch.type];
    const qty = batch.type==='NaOH' ? batch.naoh_kg : batch.type==='Phosphoric' ? (batch.acid_ml||0)/1000 : (batch.vitA_g||0)/1000;
    setInventory(prev => prev.map(i => i.chemical===chem ? {...i, stock: Math.max(0, i.stock - qty)} : i));
  };

  const approveBatch = (batch) => {
    setBatches(prev => prev.map(b => b.id===batch.id ? {...b, status:'approved', approver:user.name, approved_at:todayStr()} : b));
    deductInventory(batch);
    addAudit(`Approved batch ${batch.id} — inventory deducted for ${batch.type}`,'success','approval');
    showToast(`Batch ${batch.id} approved`,'success');
  };

  const rejectBatch = (id) => {
    if (!rejectReason.trim()) return;
    setBatches(prev => prev.map(b => b.id===id ? {...b, status:'rejected', approver:user.name, rejection_reason:rejectReason} : b));
    addAudit(`Rejected batch ${id}: ${rejectReason}`,'warning','approval');
    showToast(`Batch ${id} rejected`,'error');
    setRejectId(null); setRejectReason('');
  };

  const saveInflation = () => {
    setInflationRate(parseFloat(tempInfl)||0);
    setMarginAbove(parseFloat(tempMargin)||0);
    addAudit(`Updated inflation settings — Rate: ${tempInfl}%, Margin above: ${tempMargin}%`,'info','system');
    setShowInflation(false);
    showToast('Inflation settings saved');
  };

  const BatchCard = ({ batch }) => (
    <div className="approval-card">
      <div className="approval-card-header">
        <div>
          <span className="approval-card-id">{batch.id}</span>
          <span className="approval-card-meta"> · {batch.type} · {batch.date} · Submitted by {batch.operator}</span>
        </div>
        <span className={`badge badge-${batch.status}`}>{batch.status.toUpperCase()}</span>
      </div>
      <div className="approval-card-params">
        <div className="acp-item"><span className="acp-label">Oil Volume: </span><span className="acp-value">{fmtN(batch.oil_volume)}L</span></div>
        {batch.naoh_kg && <div className="acp-item"><span className="acp-label">NaOH: </span><span className="acp-value">{batch.naoh_kg}kg</span></div>}
        {batch.ffa && <div className="acp-item"><span className="acp-label">FFA: </span><span className="acp-value">{batch.ffa}%</span></div>}
        {batch.acid_ml && <div className="acp-item"><span className="acp-label">H₃PO₄: </span><span className="acp-value">{batch.acid_ml}mL</span></div>}
        {batch.vitA_g && <div className="acp-item"><span className="acp-label">Vit A: </span><span className="acp-value">{batch.vitA_g}g</span></div>}
        {batch.target_conc && <div className="acp-item"><span className="acp-label">Target: </span><span className="acp-value">{batch.target_conc} IU/g</span></div>}
        {batch.rejection_reason && <div className="acp-item" style={{width:'100%'}}><span className="acp-label">Rejection reason: </span><span className="acp-value" style={{color:'var(--red)'}}>{batch.rejection_reason}</span></div>}
      </div>
      {canApprove && batch.status==='pending' && (
        <div className="approval-actions">
          <button className="btn btn-success btn-sm" onClick={()=>approveBatch(batch)}>✓ Approve</button>
          {rejectId===batch.id ? (
            <>
              <input className="reject-input" placeholder="Rejection reason (required)…" value={rejectReason} onChange={e=>setRejectReason(e.target.value)}/>
              <button className="btn btn-danger btn-sm" onClick={()=>rejectBatch(batch.id)} disabled={!rejectReason.trim()}>Confirm</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setRejectId(null);setRejectReason('');}}>Cancel</button>
            </>
          ) : (
            <button className="btn btn-danger btn-sm" onClick={()=>setRejectId(batch.id)}>✕ Reject</button>
          )}
        </div>
      )}
      {!canApprove && batch.status==='pending' && <div style={{fontSize:12,color:'var(--text3)'}}>Manager position or above required to approve batches</div>}
    </div>
  );

  return (
    <div>
      <div className="flex-between mb-16">
        <div>
          <div className="page-heading">Approval Queue</div>
          <div className="page-sub">{pending.length} batch{pending.length!==1?'es':''} awaiting approval</div>
        </div>
        {canInflation && (
          <button className="btn btn-ghost" onClick={()=>{setShowInflation(!showInflation);setTempInfl(inflationRate);setTempMargin(marginAbove);}}>
            ⚙ Inflation & Margin Settings
          </button>
        )}
      </div>

      {showInflation && (
        <div className="card accent-border mb-16">
          <div className="section-title">Inflation & Margin Settings (Director+ only)</div>
          <div className="form-row">
            <div className="field">
              <label>Inflation Rate (%)</label>
              <input type="number" step="0.5" value={tempInfl} onChange={e=>setTempInfl(e.target.value)}/>
            </div>
            <div className="field">
              <label>Margin Above Inflation (%)</label>
              <input type="number" step="0.5" value={tempMargin} onChange={e=>setTempMargin(e.target.value)}/>
            </div>
            <div className="field" style={{maxWidth:120}}>
              <label>&nbsp;</label>
              <button className="btn btn-success" onClick={saveInflation}>Save Settings</button>
            </div>
          </div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>
            Effective total margin: <strong style={{color:'var(--accent)'}}>{(parseFloat(tempInfl)||0)+(parseFloat(tempMargin)||0)}%</strong> above ex-factory price
          </div>
        </div>
      )}

      <div className="tabs">
        <div className={`tab-item${activeTab==='pending'?' active':''}`} onClick={()=>setActiveTab('pending')}>Pending ({pending.length})</div>
        <div className={`tab-item${activeTab==='approved'?' active':''}`} onClick={()=>setActiveTab('approved')}>Approved ({approved.length})</div>
        <div className={`tab-item${activeTab==='rejected'?' active':''}`} onClick={()=>setActiveTab('rejected')}>Rejected ({rejected.length})</div>
        <div className={`tab-item${activeTab==='all'?' active':''}`} onClick={()=>setActiveTab('all')}>All ({batches.length})</div>
      </div>

      {activeTab === 'pending' && (
        <>
          {pending.length===0 ? <div className="empty-state card">✓ No batches pending approval</div> : pending.map(b=><BatchCard key={b.id} batch={b}/>)}
        </>
      )}

      {(activeTab==='approved'||activeTab==='rejected'||activeTab==='all') && (
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Batch ID</th><th>Type</th><th>Date</th><th>Oil (L)</th><th>Operator</th><th>Status</th><th>Approver</th><th>Notes</th></tr></thead>
              <tbody>
                {(activeTab==='all'?[...batches]:activeTab==='approved'?approved:rejected).slice().reverse().map(b=>(
                  <tr key={b.id}>
                    <td className="td-mono">{b.id}</td>
                    <td className="td-primary">{b.type}</td>
                    <td className="td-muted">{b.date}</td>
                    <td className="td-mono">{fmtN(b.oil_volume)}</td>
                    <td>{b.operator}</td>
                    <td><span className={`badge badge-${b.status}`}>{b.status.toUpperCase()}</span></td>
                    <td className="td-muted">{b.approver||'—'}</td>
                    <td className="td-muted" style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.rejection_reason||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   INVENTORY MANAGEMENT
══════════════════════════════════════════════════════════ */
function InventoryPage({ inventory, setInventory, addAudit, showToast }) {
  const [editId, setEditId]   = useState(null);
  const [adjQty, setAdjQty]   = useState('');
  const [adjNote, setAdjNote] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [newItem, setNewItem] = useState({ chemical:'', category:'Base Chemical', stock:'', unit:'kg', min_stock:'', cost_per_unit:'', supplier:'' });

  const save = (id) => {
    const qty = parseFloat(adjQty);
    if (isNaN(qty)) return;
    setInventory(prev => prev.map(i => i.id===id ? {...i, stock:Math.max(0, i.stock+qty)} : i));
    addAudit(`Inventory adjusted for item "${inventory.find(i=>i.id===id)?.chemical}" ${qty>=0?'+':''}${qty} — ${adjNote||'Manual adjustment'}`,'info','inventory');
    showToast(`Inventory updated`);
    setEditId(null); setAdjQty(''); setAdjNote('');
  };

  const addItem = () => {
    if (!newItem.chemical||!newItem.stock) return;
    const item = { ...newItem, id:'i'+Date.now(), stock:parseFloat(newItem.stock), min_stock:parseFloat(newItem.min_stock)||10, cost_per_unit:parseFloat(newItem.cost_per_unit)||0 };
    setInventory(p=>[...p,item]);
    addAudit(`New chemical added to inventory: ${newItem.chemical} (${newItem.stock} ${newItem.unit})`,'success','inventory');
    showToast(`${newItem.chemical} added to inventory`);
    setNewItem({chemical:'',category:'Base Chemical',stock:'',unit:'kg',min_stock:'',cost_per_unit:'',supplier:''});
    setShowAdd(false);
  };

  const lowStock = inventory.filter(i=>i.stock<=i.min_stock);
  const totalValue = inventory.reduce((s,i)=>s+(i.stock*i.cost_per_unit),0);

  return (
    <div>
      <div className="flex-between mb-16">
        <div>
          <div className="page-heading">Chemical Inventory</div>
          <div className="page-sub">{inventory.length} chemicals tracked · {lowStock.length} low stock alert{lowStock.length!==1?'s':''}</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(!showAdd)}>+ Add Chemical</button>
      </div>

      <div className="metrics-row cols-3 mb-16">
        <div className="metric-card"><div className="metric-label">Total Items</div><div className="metric-value">{inventory.length}</div></div>
        <div className="metric-card red"><div className="metric-label">Low Stock Alerts</div><div className="metric-value">{lowStock.length}</div></div>
        <div className="metric-card accent"><div className="metric-label">Total Inventory Value</div><div className="metric-value" style={{fontSize:18}}>₦{fmtN(totalValue)}</div></div>
      </div>

      {lowStock.length > 0 && (
        <div className="alert alert-danger mb-16">
          <span className="alert-icon">▼</span>
          <div><strong>Low Stock:</strong> {lowStock.map(i=>`${i.chemical} (${fmt(i.stock,1)} ${i.unit})`).join(' · ')}</div>
        </div>
      )}

      {showAdd && (
        <div className="card accent-border mb-16">
          <div className="section-title">Add New Chemical</div>
          <div className="form-grid cols-3">
            <div className="field"><label>Chemical Name</label><input value={newItem.chemical} onChange={e=>setNewItem({...newItem,chemical:e.target.value})} placeholder="e.g. Citric Acid"/></div>
            <div className="field"><label>Category</label>
              <select value={newItem.category} onChange={e=>setNewItem({...newItem,category:e.target.value})}>
                {['Base Chemical','Acid','Fortifier','Adsorbent','Filtration','Antioxidant','Other'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="field"><label>Supplier</label><input value={newItem.supplier} onChange={e=>setNewItem({...newItem,supplier:e.target.value})} placeholder="Supplier name"/></div>
            <div className="field"><label>Initial Stock</label><input type="number" value={newItem.stock} onChange={e=>setNewItem({...newItem,stock:e.target.value})}/></div>
            <div className="field"><label>Unit</label>
              <select value={newItem.unit} onChange={e=>setNewItem({...newItem,unit:e.target.value})}>
                {['kg','L','g','mL','tonne','drum'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
            <div className="field"><label>Min Stock Level</label><input type="number" value={newItem.min_stock} onChange={e=>setNewItem({...newItem,min_stock:e.target.value})}/></div>
            <div className="field"><label>Cost per Unit (₦)</label><input type="number" value={newItem.cost_per_unit} onChange={e=>setNewItem({...newItem,cost_per_unit:e.target.value})}/></div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="btn btn-success" onClick={addItem} disabled={!newItem.chemical||!newItem.stock}>Add to Inventory</button>
            <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
          </div>
        </div>
      )}

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Chemical</th><th>Category</th><th>Stock</th><th>Unit</th><th>Min Level</th><th>Cost/Unit</th><th>Total Value</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
              {inventory.map(i => (
                <tr key={i.id}>
                  <td className="td-primary">{i.chemical}</td>
                  <td className="td-muted">{i.category}</td>
                  <td>
                    <div style={{marginBottom:4}}>
                      <span className="td-mono" style={{color:i.stock<=i.min_stock?'var(--red)':i.stock<=i.min_stock*2?'var(--accent)':'var(--text)'}}>{fmt(i.stock,1)}</span>
                    </div>
                    <div className="progress" style={{width:80}}>
                      <div className="progress-fill" style={{
                        width:`${Math.min(100,(i.stock/(i.min_stock*6))*100)}%`,
                        background:i.stock<=i.min_stock?'var(--red)':i.stock<=i.min_stock*2?'var(--accent)':'var(--green)'
                      }}/>
                    </div>
                  </td>
                  <td className="td-muted">{i.unit}</td>
                  <td className="td-mono">{i.min_stock}</td>
                  <td className="td-mono">{fmtCur(i.cost_per_unit)}</td>
                  <td className="td-mono">{fmtCur(i.stock * i.cost_per_unit)}</td>
                  <td><span className={`badge ${i.stock<=i.min_stock?'badge-low':'badge-ok'}`}>{i.stock<=i.min_stock?'LOW STOCK':'OK'}</span></td>
                  <td>
                    {editId===i.id ? (
                      <div style={{display:'flex',gap:4,alignItems:'center',minWidth:220}}>
                        <input type="number" style={{width:70,background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',padding:'4px 6px',borderRadius:4,fontSize:12,outline:'none'}} placeholder="+/-" value={adjQty} onChange={e=>setAdjQty(e.target.value)}/>
                        <input style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',padding:'4px 6px',borderRadius:4,fontSize:11,outline:'none'}} placeholder="Note…" value={adjNote} onChange={e=>setAdjNote(e.target.value)}/>
                        <button className="btn btn-success btn-xs" onClick={()=>save(i.id)}>✓</button>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setEditId(null)}>✗</button>
                      </div>
                    ) : (
                      <button className="btn btn-ghost btn-xs" onClick={()=>setEditId(i.id)}>Adjust Stock</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   ANALYTICS
══════════════════════════════════════════════════════════ */
function AnalyticsDashboard({ batches, inventory, inflationRate, marginAbove }) {
  const approved = batches.filter(b=>b.status==='approved');
  const byType   = t => batches.filter(b=>b.type===t);
  const approvedByType = t => batches.filter(b=>b.type===t&&b.status==='approved');

  const approvalRate = batches.length ? Math.round((approved.length/batches.length)*100) : 0;
  const totalOil = approved.reduce((s,b)=>s+(b.oil_volume||0),0);
  const avgOilPerBatch = approved.length ? totalOil/approved.length : 0;

  const types = [
    { label:'NaOH Neutralisation', type:'NaOH', color:'var(--blue)' },
    { label:'Phosphoric Degumming', type:'Phosphoric', color:'var(--green)' },
    { label:'Vitamin A Fortification', type:'VitaminA', color:'var(--accent)' },
  ];

  const inventoryHealth = inventory.filter(i=>i.stock>i.min_stock*2).length;
  const healthScore = Math.round(
    (approvalRate * 0.3) +
    ((inventoryHealth/inventory.length)*100 * 0.3) +
    (batches.length>0?70:0 * 0.4)
  );

  return (
    <div>
      <div className="page-heading mb-4">Analytics Dashboard</div>
      <div className="page-sub mb-16">Operational KPIs and production intelligence</div>

      <div className="metrics-row">
        <div className="metric-card accent">
          <div className="metric-label">Total Oil Processed</div>
          <div className="metric-value">{fmtN(totalOil)}</div>
          <div className="metric-sub">Litres — approved batches</div>
        </div>
        <div className="metric-card green">
          <div className="metric-label">Batch Approval Rate</div>
          <div className="metric-value">{approvalRate}%</div>
          <div className="metric-sub">{approved.length} of {batches.length} batches</div>
        </div>
        <div className="metric-card blue">
          <div className="metric-label">Avg Oil / Batch</div>
          <div className="metric-value">{fmtN(Math.round(avgOilPerBatch))}</div>
          <div className="metric-sub">Litres per approved batch</div>
        </div>
        <div className="metric-card" style={{borderLeft:'3px solid var(--cyan)'}}>
          <div className="metric-label">Ops Health Score</div>
          <div className="metric-value" style={{color:'var(--cyan)'}}>{healthScore}</div>
          <div className="metric-sub">/ 100 composite score</div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="section-title">Batch Type Distribution</div>
          {types.map(t => {
            const total = byType(t.type).length;
            const appr  = approvedByType(t.type).length;
            return (
              <div key={t.type} style={{marginBottom:16}}>
                <div className="flex-between mb-4">
                  <span style={{fontSize:13,color:'var(--text2)'}}>{t.label}</span>
                  <span style={{fontSize:12,color:'var(--text3)',fontFamily:'var(--mono)'}}>{appr}/{total} approved</span>
                </div>
                <div className="progress">
                  <div className="progress-fill" style={{width:`${batches.length?Math.round((total/batches.length)*100):0}%`,background:t.color}}/>
                </div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{batches.length?Math.round((total/batches.length)*100):0}% of all batches</div>
              </div>
            );
          })}
        </div>

        <div className="card">
          <div className="section-title">Batch Status Breakdown</div>
          {[
            ['Approved', approved.length, 'var(--green)'],
            ['Pending', batches.filter(b=>b.status==='pending').length, 'var(--accent)'],
            ['Rejected', batches.filter(b=>b.status==='rejected').length, 'var(--red)'],
          ].map(([l,v,c]) => (
            <div key={l} style={{marginBottom:14}}>
              <div className="flex-between mb-4">
                <span style={{fontSize:13,color:'var(--text2)'}}>{l}</span>
                <span style={{fontSize:14,fontFamily:'var(--mono)',fontWeight:500,color:c}}>{v}</span>
              </div>
              <div className="progress">
                <div className="progress-fill" style={{width:`${batches.length?Math.round((v/batches.length)*100):0}%`,background:c}}/>
              </div>
            </div>
          ))}

          <div className="separator"/>
          <div className="section-title">Inventory Health</div>
          {inventory.map(i => {
            const pct = Math.min(100,(i.stock/(i.min_stock*6))*100);
            return (
              <div key={i.id} style={{marginBottom:10}}>
                <div className="flex-between mb-4">
                  <span style={{fontSize:12,color:'var(--text2)'}}>{i.chemical}</span>
                  <span style={{fontSize:11,fontFamily:'var(--mono)',color:i.stock<=i.min_stock?'var(--red)':'var(--text3)'}}>{fmt(i.stock,1)} {i.unit}</span>
                </div>
                <div className="progress">
                  <div className="progress-fill" style={{width:`${pct}%`,background:i.stock<=i.min_stock?'var(--red)':i.stock<=i.min_stock*2?'var(--accent)':'var(--green)'}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="section-title">Detailed KPI Table</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Metric</th><th>Value</th><th>Benchmark</th><th>Status</th></tr></thead>
            <tbody>
              {[
                ['Total Batches Submitted', batches.length, '≥10 per period', batches.length>=10?'badge-ok':'badge-pending'],
                ['Approved Batches', approved.length, '≥7 per period', approved.length>=7?'badge-ok':'badge-pending'],
                ['Approval Rate', approvalRate+'%', '≥80%', approvalRate>=80?'badge-ok':'badge-rejected'],
                ['Vitamin A Compliance', approvedByType('VitaminA').length+'/'+byType('VitaminA').length, '100%', byType('VitaminA').length>0&&approvedByType('VitaminA').length===byType('VitaminA').length?'badge-ok':'badge-pending'],
                ['Total Oil Processed', fmtN(totalOil)+'L', '—', 'badge-info'],
                ['Low Stock Items', inventory.filter(i=>i.stock<=i.min_stock).length, '0', inventory.filter(i=>i.stock<=i.min_stock).length===0?'badge-ok':'badge-rejected'],
                ['Effective Margin', (inflationRate+marginAbove)+'%', `>${inflationRate}%`, marginAbove>0?'badge-ok':'badge-pending'],
              ].map(([m,v,b,s])=>(
                <tr key={m}>
                  <td className="td-primary">{m}</td>
                  <td className="td-mono">{v}</td>
                  <td className="td-muted">{b}</td>
                  <td><span className={`badge ${s}`}>{s.replace('badge-','').toUpperCase()}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════

function NAFDACReport({ batches }) {
  const approved = batches.filter(b=>b.status==='approved');

  const vitAll = batches.filter(b=>b.type==='VitaminA');
  const allCompliant = vitAll.every(b => b.status==='approved'||(b.target_conc&&b.target_conc>=11));
  const reportDate = todayStr();

  const printReport = () => window.print();

  return (
    <div>
      <div className="flex-between mb-16">
        <div>
          <div className="page-heading">NAFDAC Compliance Report</div>
          <div className="page-sub">Generated: {reportDate} · Period: 2024</div>
        </div>
        <button className="btn btn-blue" onClick={printReport}>⎙ Print Report</button>
      </div>

      <div className="nafdac-header">
        <div className="nafdac-seal">⬡</div>
        <div>
          <div className="nafdac-title">National Agency for Food & Drug Administration and Control</div>
          <div className="nafdac-ref">Registration: VEG-OIL/2024/NG · Standard: Edible Vegetable Oil Fortification</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:5}}>Ugomba Noel Vegetable Oil Refinery · Production Operations Report</div>
        </div>
        <div style={{marginLeft:'auto',textAlign:'right'}}>
          <span className={`badge ${allCompliant?'badge-approved':'badge-pending'}`} style={{fontSize:12,padding:'4px 12px'}}>
            {allCompliant?'✓ COMPLIANT':'⚠ REVIEW REQUIRED'}
          </span>
        </div>
      </div>

      <div className="metrics-row cols-3 mb-16">
        <div className="metric-card green">
          <div className="metric-label">Approved Production Batches</div>
          <div className="metric-value">{approved.length}</div>
          <div className="metric-sub">Cleared for distribution</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Vitamin A Batches</div>
          <div className="metric-value">{vitApproved.length}/{vitAll.length}</div>
          <div className="metric-sub">Approved / Total</div>
        </div>
        <div className="metric-card accent">
          <div className="metric-label">NAFDAC Min. Standard</div>
          <div className="metric-value">11</div>
          <div className="metric-sub">IU/g Vitamin A minimum</div>
        </div>
      </div>

      <div className="card">
        <div className="section-title">Vitamin A Fortification Records</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Batch ID</th><th>Date</th><th>Oil Vol (L)</th><th>Target (IU/g)</th><th>Vit A Added (g)</th><th>Operator</th><th>Approver</th><th>NAFDAC Status</th></tr></thead>
            <tbody>
              {batches.filter(b=>b.type==='VitaminA').map(b=>(
                <tr key={b.id}>
                  <td className="td-mono">{b.id}</td>
                  <td className="td-muted">{b.date}</td>
                  <td className="td-mono">{fmtN(b.oil_volume)}</td>
                  <td className="td-mono" style={{color:(b.target_conc||0)>=11?'var(--green)':'var(--red)'}}>{b.target_conc||'—'}</td>
                  <td className="td-mono">{b.vitA_g||'—'}</td>
                  <td>{b.operator}</td>
                  <td className="td-muted">{b.approver||'Pending'}</td>
                  <td>
                    {b.status==='approved' && (b.target_conc||0)>=11
                      ? <span className="badge badge-approved">✓ COMPLIANT</span>
                      : b.status==='pending'
                      ? <span className="badge badge-pending">PENDING</span>
                      : <span className="badge badge-rejected">NON-COMPLIANT</span>
                    }
                  </td>
                </tr>
              ))}
              {batches.filter(b=>b.type==='VitaminA').length===0&&<tr><td colSpan={8} className="empty-state">No Vitamin A batches recorded</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <div className="card">
        <div className="section-title">All Approved Production Batches</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Batch ID</th><th>Process Type</th><th>Date</th><th>Oil Vol (L)</th><th>Operator</th><th>Approver</th><th>Approved Date</th></tr></thead>
            <tbody>
              {approved.map(b=>(
                <tr key={b.id}>
                  <td className="td-mono">{b.id}</td>
                  <td className="td-primary">{b.type}</td>
                  <td className="td-muted">{b.date}</td>
                  <td className="td-mono">{fmtN(b.oil_volume)}</td>
                  <td>{b.operator}</td>
                  <td>{b.approver}</td>
                  <td className="td-muted">{b.approved_at||b.date}</td>
                </tr>
              ))}
              {approved.length===0&&<tr><td colSpan={7} className="empty-state">No approved batches</td></tr>}

      </div>
    </div>
  );
}

          <div key={c} className={`tab-item${filter===c?' active':''}`} onClick={()=>setFilter(c)}>

/* ══════════════════════════════════════════════════════════
   ROLE & USER MANAGEMENT
══════════════════════════════════════════════════════════ */
function RoleManagement({ user, users, setUsers, addAudit, showToast }) {
  const [activeTab, setActiveTab] = useState('users');
  const [editUser, setEditUser]   = useState(null);
  const [showAdd, setShowAdd]     = useState(false);
  const [newUser, setNewUser]     = useState({ name:'', email:'', password:'', role:'user', position:'Lab Technician', custom_role:'lab_tech_role', active:true });

  const isSuperAdmin = user.role === 'superadmin';

  const saveEdit = () => {
    if (!editUser) return;
    setUsers(prev => prev.map(u => u.id===editUser.id ? editUser : u));
    addAudit(`User "${editUser.name}" updated — role: ${editUser.role}, position: ${editUser.position}`,'info','system');
    showToast('User updated');
    setEditUser(null);
  };

  const toggleActive = (u) => {
    if (u.id === user.id) return showToast("Can't deactivate yourself",'error');
    setUsers(prev => prev.map(x => x.id===u.id ? {...x,active:!x.active} : x));
    addAudit(`User "${u.name}" ${u.active?'deactivated':'activated'}`,'warning','system');
    showToast(`User ${u.active?'deactivated':'activated'}`);
  };

  const addUser = () => {
    if (!newUser.name||!newUser.email||!newUser.password) return showToast('All fields required','error');
    if (users.find(u=>u.email.toLowerCase()===newUser.email.toLowerCase())) return showToast('Email already in use','error');
    const u = { ...newUser, id:'u'+Date.now(), created:todayStr() };
    setUsers(p=>[...p,u]);
    addAudit(`New user created: ${u.name} (${u.email}) — role: ${u.role}, position: ${u.position}`,'success','system');
    showToast(`${u.name} added`);
    setNewUser({name:'',email:'',password:'',role:'user',position:'Lab Technician',custom_role:'lab_tech_role',active:true});
    setShowAdd(false);
  };

  const deleteUser = (u) => {
    if (u.id===user.id) return showToast("Can't delete yourself",'error');
    if (!isSuperAdmin) return showToast('Only Super Admin can delete users','error');
    setUsers(prev=>prev.filter(x=>x.id!==u.id));
    addAudit(`User "${u.name}" deleted by ${user.name}`,'warning','system');
    showToast(`${u.name} deleted`);
  };

  const permNames = {
    naoh_calculator:'NaOH Calc', phosphoric_calculator:'Phosphoric Calc', vitamina_calculator:'Vitamin A Calc',
    cost_dashboard:'Cost Dashboard', analytics_dashboard:'Analytics', nafdac_report:'NAFDAC Report',
    inventory_management:'Inventory', audit_log:'Audit Log', can_delete_batches:'Delete Batches',
    role_management:'Role Mgmt', inflation_settings:'Inflation Settings',
  };

  return (
    <div>
      <div className="flex-between mb-16">
        <div>
          <div className="page-heading">Role & User Management</div>
          <div className="page-sub">{users.length} users · {users.filter(u=>u.active).length} active · {users.filter(u=>!u.active).length} inactive</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {isSuperAdmin && <span className="badge badge-rejected" style={{padding:'4px 10px'}}>Super Admin Mode</span>}
          <button className="btn btn-primary" onClick={()=>setShowAdd(!showAdd)}>+ Add User</button>
        </div>
      </div>

      {isSuperAdmin && (
        <div className="alert alert-danger mb-16">
          <span className="alert-icon">⬡</span>
          Super Admin mode active. You have unrestricted access to all user management functions including deletion and role override.
        </div>
      )}

      <div className="tabs">
        <div className={`tab-item${activeTab==='users'?' active':''}`} onClick={()=>setActiveTab('users')}>Users ({users.length})</div>
        <div className={`tab-item${activeTab==='roles'?' active':''}`} onClick={()=>setActiveTab('roles')}>Role Permissions</div>
      </div>

      {/* ADD USER FORM */}
      {showAdd && (
        <div className="card accent-border mb-16">
          <div className="section-title">Add New User</div>
          <div className="form-grid cols-3">
            <div className="field"><label>Full Name</label><input value={newUser.name} onChange={e=>setNewUser({...newUser,name:e.target.value})} placeholder="e.g. John Doe"/></div>
            <div className="field"><label>Email Address</label><input type="email" value={newUser.email} onChange={e=>setNewUser({...newUser,email:e.target.value})} placeholder="john@ugomba.com"/></div>
            <div className="field"><label>Password</label><input type="password" value={newUser.password} onChange={e=>setNewUser({...newUser,password:e.target.value})} placeholder="Set initial password"/></div>
            <div className="field">
              <label>System Role</label>
              <select value={newUser.role} onChange={e=>setNewUser({...newUser,role:e.target.value})}>
                {isSuperAdmin && <option value="superadmin">Super Admin</option>}
                <option value="admin">Admin</option>
                <option value="user">User</option>
              </select>
            </div>
            <div className="field">
              <label>Position</label>
              <select value={newUser.position} onChange={e=>setNewUser({...newUser,position:e.target.value})}>
                {Object.keys(POSITION_LEVELS).filter(p=>p!=='SuperAdmin').map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Custom Role (Permissions)</label>
              <select value={newUser.custom_role} onChange={e=>setNewUser({...newUser,custom_role:e.target.value})}>
                <option value="full_access">Full Access</option>
                <option value="manager_role">Manager Role</option>
                <option value="lab_tech_role">Lab Tech Role</option>
                <option value="secretary_role">Secretary Role</option>
              </select>
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="btn btn-success" onClick={addUser}>Create User</button>
            <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* EDIT USER MODAL */}
      {editUser && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditUser(null)}>
          <div className="modal">
            <div className="modal-title">Edit User: {editUser.name}</div>
            <div className="modal-sub">Modify role, position, and permissions. Password changes are saved immediately.</div>
            <div className="form-grid cols-2">
              <div className="field"><label>Full Name</label><input value={editUser.name} onChange={e=>setEditUser({...editUser,name:e.target.value})}/></div>
              <div className="field"><label>Email</label><input value={editUser.email} onChange={e=>setEditUser({...editUser,email:e.target.value})}/></div>
              <div className="field"><label>New Password (leave blank = no change)</label><input type="password" placeholder="New password…" onChange={e=>e.target.value&&setEditUser({...editUser,password:e.target.value})}/></div>
              <div className="field">
                <label>System Role</label>
                <select value={editUser.role} onChange={e=>setEditUser({...editUser,role:e.target.value})}>
                  {isSuperAdmin&&<option value="superadmin">Super Admin</option>}
                  <option value="admin">Admin</option>
                  <option value="user">User</option>
                </select>
              </div>
              <div className="field">
                <label>Position</label>
                <select value={editUser.position} onChange={e=>setEditUser({...editUser,position:e.target.value})}>
                  {Object.keys(POSITION_LEVELS).filter(p=>isSuperAdmin||p!=='SuperAdmin').map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Custom Role</label>
                <select value={editUser.custom_role} onChange={e=>setEditUser({...editUser,custom_role:e.target.value})}>
                  <option value="full_access">Full Access</option>
                  <option value="manager_role">Manager Role</option>
                  <option value="lab_tech_role">Lab Tech Role</option>
                  <option value="secretary_role">Secretary Role</option>
                </select>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setEditUser(null)}>Cancel</button>
              <button className="btn btn-success" onClick={saveEdit}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* USERS TABLE */}
      {activeTab === 'users' && (
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>System Role</th><th>Position</th><th>Custom Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
              <tbody>
                {users.map(u=>(
                  <tr key={u.id}>
                    <td className="td-primary">{u.name}{u.id===user.id&&<span style={{fontSize:10,color:'var(--text3)',marginLeft:6}}>(you)</span>}</td>
                    <td className="td-mono" style={{fontSize:12}}>{u.email}</td>
                    <td><span className={`role-pill rp-${u.role}`}>{u.role.toUpperCase()}</span></td>
                    <td>{u.position}</td>
                    <td><span className="tag">{u.custom_role}</span></td>
                    <td><span className={`badge ${u.active?'badge-active':'badge-inactive'}`}>{u.active?'ACTIVE':'INACTIVE'}</span></td>
                    <td className="td-muted">{u.created||'—'}</td>
                    <td>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setEditUser({...u})}>Edit</button>
                        {u.id!==user.id&&<button className="btn btn-xs" style={{background:u.active?'rgba(231,76,60,.15)':'rgba(46,204,113,.15)',color:u.active?'var(--red)':'var(--green)',border:'none',borderRadius:4,cursor:'pointer'}} onClick={()=>toggleActive(u)}>{u.active?'Deactivate':'Activate'}</button>}
                        {isSuperAdmin&&u.id!==user.id&&<button className="btn btn-danger btn-xs" onClick={()=>deleteUser(u)}>Del</button>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* PERMISSIONS MATRIX */}
      {activeTab === 'roles' && (
        <div className="card">
          <div className="section-title">Permission Matrix — Custom Roles</div>
          <div className="table-wrap">
            <table className="matrix-table">
              <thead>
                <tr>
                  <th>Permission</th>
                  {Object.keys(DEFAULT_PERMISSIONS).map(r=><th key={r}>{r.replace('_role','').replace('_',' ')}</th>)}
                </tr>
              </thead>
              <tbody>
                {Object.entries(permNames).map(([perm,label])=>(
                  <tr key={perm}>
                    <td className="td-primary">{label}</td>
                    {Object.values(DEFAULT_PERMISSIONS).map((perms,i)=>(
                      <td key={i} style={{textAlign:'center'}}>
                        <span style={{color:perms[perm]?'var(--green)':'var(--red)',fontSize:16}}>
                          {perms[perm]?'✓':'✗'}
                        </span>
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="alert alert-info mt-12">
            <span className="alert-icon">ℹ</span>
            <div>SuperAdmin and Admin roles bypass all permission checks and always have full access regardless of custom_role assignment. The permission matrix applies only to users with role=<span className="tag">user</span>.</div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   MOUNT
══════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
