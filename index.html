<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ugomba Noel — Oil Refinery Operations Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ===== RESET & VARIABLES ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --bg2:#161b27;
  --bg3:#1e2535;
  --bg4:#252d40;
  --bg5:#2e3850;
  --border:#2a3350;
  --border2:#3a4a6a;
  --border3:#4a5a80;
  --text:#e8eaf0;
  --text2:#a0aabf;
  --text3:#6070a0;
  --text4:#3d4d70;
  --accent:#f5a623;
  --accent2:#e8921a;
  --accent3:#ffc55a;
  --green:#2ecc71;
  --green2:#27ae60;
  --red:#e74c3c;
  --red2:#c0392b;
  --blue:#4a9eff;
  --blue2:#2980b9;
  --purple:#9b59b6;
  --cyan:#1abc9c;
  --font:'IBM Plex Sans','Segoe UI',sans-serif;
  --mono:'IBM Plex Mono','Courier New',monospace;
  --radius:6px;
  --radius-lg:10px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
}

/* ===== BASE ===== */
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:var(--blue);text-decoration:none}
input,select,textarea{font-family:var(--font)}
button{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border3)}

/* ===== LAYOUT ===== */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:240px;min-width:240px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
  transition:width .2s;
}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:56px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.page-content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}

/* ===== SIDEBAR ===== */
.sidebar-logo{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo-hex{font-size:22px;color:var(--accent);line-height:1}
.sidebar-logo-title{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.sidebar-logo-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.5px}
.sidebar-logo-version{font-size:9px;color:var(--text4);margin-top:6px;font-family:var(--mono);background:var(--bg3);padding:2px 6px;border-radius:3px;display:inline-block}

.nav-group{padding:8px 0}
.nav-group-label{
  font-size:9px;color:var(--text4);
  letter-spacing:2px;text-transform:uppercase;
  padding:8px 20px 4px;
  font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;
  cursor:pointer;
  color:var(--text3);
  font-size:13px;
  font-weight:400;
  transition:all .12s;
  border-left:2px solid transparent;
  position:relative;
  user-select:none;
}
.nav-item:hover{background:var(--bg3);color:var(--text2);border-left-color:var(--border2)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(245,166,35,.08),transparent);
  color:var(--accent);
  border-left-color:var(--accent);
  font-weight:500;
}
.nav-item .nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{
  margin-left:auto;
  font-size:10px;font-weight:600;
  padding:1px 7px;border-radius:10px;
  background:var(--red);color:#fff;
  font-family:var(--mono);
}
.nav-badge.warn{background:var(--accent);color:#0f1117}
.nav-badge.ok{background:var(--green);color:#0f1117}

.sidebar-user{
  margin-top:auto;
  padding:16px;
  border-top:1px solid var(--border);
  background:var(--bg2);
}
.sidebar-user-name{font-size:13px;font-weight:500;color:var(--text)}
.sidebar-user-pos{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-user-roles{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}

/* ===== TOPBAR ===== */
.topbar-page-title{font-size:15px;font-weight:500;color:var(--text)}
.topbar-breadcrumb{font-size:12px;color:var(--text3);margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-alert{font-size:12px;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.topbar-alert.warn{background:rgba(245,166,35,.12);color:var(--accent);border:1px solid rgba(245,166,35,.25)}
.topbar-alert.danger{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.topbar-user-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px 5px 8px;
  cursor:pointer;font-size:12px;
  transition:border-color .12s;
}
.topbar-user-chip:hover{border-color:var(--border2)}
.user-avatar{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;
}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ===== TYPOGRAPHY ===== */
.page-heading{font-size:20px;font-weight:500;color:var(--text);letter-spacing:-.3px}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.mono{font-family:var(--mono)}

/* ===== CARDS ===== */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
  margin-bottom:16px;
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card.accent-border{border-left:3px solid var(--accent)}
.card.green-border{border-left:3px solid var(--green)}
.card.red-border{border-left:3px solid var(--red)}
.card.blue-border{border-left:3px solid var(--blue)}

/* ===== METRIC CARDS ===== */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metrics-row.cols-3{grid-template-columns:repeat(3,1fr)}
.metrics-row.cols-2{grid-template-columns:repeat(2,1fr)}
.metric-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;
  position:relative;overflow:hidden;
}
.metric-card::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:60px;border-radius:0 var(--radius-lg) 0 60px;
  opacity:.08;
}
.metric-card.accent::before{background:var(--accent)}
.metric-card.green::before{background:var(--green)}
.metric-card.red::before{background:var(--red)}
.metric-card.blue::before{background:var(--blue)}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.metric-value{font-size:26px;font-weight:500;color:var(--text);margin-top:6px;font-family:var(--mono);line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.metric-trend{display:flex;align-items:center;gap:4px;font-size:11px;margin-top:4px}
.metric-trend.up{color:var(--green)}
.metric-trend.down{color:var(--red)}

/* ===== FORMS ===== */
.form-grid{display:grid;gap:14px}
.form-grid.cols-2{grid-template-columns:1fr 1fr}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.field label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.field input,.field select,.field textarea{
  background:var(--bg3);
  border:1px solid var(--border);
  color:var(--text);
  padding:9px 12px;
  border-radius:var(--radius);
  font-size:13px;
  transition:border-color .12s,box-shadow .12s;
  outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(245,166,35,.1);
}
.field input::placeholder{color:var(--text4)}
.field select option{background:var(--bg2)}
.field-hint{font-size:10px;color:var(--text3);margin-top:2px}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:var(--radius);
  border:none;cursor:pointer;
  font-family:var(--font);font-size:13px;font-weight:500;
  transition:all .12s;white-space:nowrap;
}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#0f1117}
.btn-primary:hover:not(:disabled){background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,166,35,.3)}
.btn-success{background:var(--green);color:#0f1117}
.btn-success:hover:not(:disabled){background:var(--green2);transform:translateY(-1px)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){background:var(--red2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover:not(:disabled){border-color:var(--border3);color:var(--text);background:var(--bg3)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover:not(:disabled){background:var(--blue2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:7px;border-radius:var(--radius)}
.btn-full{width:100%;justify-content:center}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge-approved,.badge-active{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.badge-pending{background:rgba(245,166,35,.12);color:var(--accent);border:1px solid rgba(245,166,35,.2)}
.badge-rejected,.badge-inactive{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.badge-low{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.badge-ok{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.badge-info{background:rgba(74,158,255,.12);color:var(--blue);border:1px solid rgba(74,158,255,.2)}

/* Role badges */
.role-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px}
.rp-superadmin{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
.rp-admin{background:rgba(245,166,35,.15);color:var(--accent);border:1px solid rgba(245,166,35,.3)}
.rp-ceo{background:rgba(155,89,182,.15);color:var(--purple);border:1px solid rgba(155,89,182,.3)}
.rp-director{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3)}
.rp-manager{background:rgba(26,188,156,.15);color:var(--cyan);border:1px solid rgba(26,188,156,.3)}
.rp-lab{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.rp-staff{background:rgba(136,146,170,.15);color:var(--text2);border:1px solid rgba(136,146,170,.2)}

/* ===== ALERTS ===== */
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-warn{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);color:var(--accent)}
.alert-success{background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.25);color:var(--green)}
.alert-danger{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);color:var(--red)}
.alert-info{background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.25);color:var(--blue)}

/* ===== TABLES ===== */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  text-align:left;padding:10px 14px;
  font-size:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:1.5px;font-weight:600;
  background:var(--bg3);
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody td{
  padding:10px 14px;
  border-bottom:1px solid rgba(42,51,80,.5);
  color:var(--text2);
  vertical-align:middle;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(30,37,53,.7);color:var(--text)}
.td-primary{color:var(--text)!important;font-weight:500}
.td-mono{font-family:var(--mono);font-size:12px!important}
.td-muted{color:var(--text3)!important;font-size:12px}

/* ===== RESULT BOX ===== */
.result-box{
  background:linear-gradient(135deg,rgba(245,166,35,.05),rgba(245,166,35,.02));
  border:1px solid rgba(245,166,35,.25);
  border-radius:var(--radius-lg);
  padding:20px;margin-top:16px;
}
.result-box-title{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:14px}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.result-item{background:var(--bg3);border-radius:var(--radius);padding:10px 12px}
.result-item .ri-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.result-item .ri-value{font-size:16px;font-weight:500;font-family:var(--mono);color:var(--text)}
.result-item .ri-unit{font-size:10px;color:var(--text3);margin-left:3px}
.result-compliance{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600}
.rc-pass{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.rc-fail{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.2)}

/* ===== PROGRESS ===== */
.progress{background:var(--bg4);border-radius:4px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s ease}
.pf-green{background:linear-gradient(90deg,var(--green2),var(--green))}
.pf-amber{background:linear-gradient(90deg,var(--accent2),var(--accent))}
.pf-red{background:linear-gradient(90deg,var(--red2),var(--red))}
.pf-blue{background:linear-gradient(90deg,var(--blue2),var(--blue))}

/* ===== TABS ===== */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.tab-item{
  padding:10px 18px;font-size:13px;
  color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .12s;white-space:nowrap;
}
.tab-item:hover{color:var(--text2)}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}

/* ===== DIVIDER ===== */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* ===== GRID HELPERS ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-2-3{display:grid;grid-template-columns:2fr 3fr;gap:16px}
.grid-3-2{display:grid;grid-template-columns:3fr 2fr;gap:16px}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;animation:fadeIn .15s;
}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius-lg);padding:24px;
  width:90%;max-width:520px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow);animation:slideUp .18s;
}
.modal-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ===== LOGIN ===== */
.login-page{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:radial-gradient(ellipse at 20% 50%,rgba(245,166,35,.04) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(74,158,255,.03) 0%,transparent 60%),
             var(--bg);
}
.login-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:44px;
  width:420px;
  box-shadow:var(--shadow);
}
.login-header{text-align:center;margin-bottom:36px}
.login-hex{font-size:36px;color:var(--accent);display:block;margin-bottom:10px;animation:pulse 3s ease-in-out infinite}
.login-title{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.login-subtitle{font-size:12px;color:var(--text3);margin-top:5px;letter-spacing:.5px}
.login-divider{margin:24px 0;border:none;border-top:1px solid var(--border);position:relative}
.login-divider::after{content:'DEMO ACCESS';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--bg2);padding:0 10px;font-size:10px;color:var(--text4);letter-spacing:2px}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.demo-btn{
  padding:9px 12px;background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);
  border-radius:var(--radius);font-size:12px;
  cursor:pointer;font-family:var(--font);
  transition:all .12s;text-align:center;
}
.demo-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,.05)}
.demo-btn.superadmin{border-color:rgba(231,76,60,.3);color:var(--red)}
.demo-btn.superadmin:hover{background:rgba(231,76,60,.05)}
.demo-btn.admin{border-color:rgba(245,166,35,.3);color:var(--accent)}
.demo-btn .db-role{font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ===== ACCESS DENIED ===== */
.access-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;text-align:center}
.access-denied-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.access-denied-title{font-size:18px;font-weight:500;color:var(--red);margin-bottom:8px}
.access-denied-sub{font-size:13px;color:var(--text3);max-width:320px}

/* ===== COST CHAIN ===== */
.price-chain{display:flex;align-items:stretch;gap:0;margin:16px 0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.pc-item{flex:1;padding:14px 16px;background:var(--bg3);border-right:1px solid var(--border);text-align:center}
.pc-item:last-child{border-right:none}
.pc-item-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pc-item-value{font-size:18px;font-weight:500;font-family:var(--mono);color:var(--text)}
.pc-item-sub{font-size:10px;color:var(--text3);margin-top:2px}
.pc-arrow{display:flex;align-items:center;padding:0 2px;background:var(--bg3);border-right:1px solid var(--border);color:var(--text3)}

/* ===== CHART BARS ===== */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:8px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height .4s}
.bar-label{font-size:10px;color:var(--text3);text-align:center}
.bar-value{font-size:11px;color:var(--text2);font-family:var(--mono)}

/* ===== INVENTORY STATUS ===== */
.inv-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,51,80,.4)}
.inv-item:last-child{border-bottom:none}
.inv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inv-name{font-size:13px;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-stock{font-family:var(--mono);font-size:13px;color:var(--text);white-space:nowrap}

/* ===== APPROVAL CARD ===== */
.approval-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;
  transition:border-color .12s;
}
.approval-card:hover{border-color:var(--border2)}
.approval-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.approval-card-id{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
.approval-card-meta{font-size:12px;color:var(--text3)}
.approval-card-params{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.acp-item{font-size:12px}
.acp-label{color:var(--text3)}
.acp-value{color:var(--text);font-family:var(--mono);font-weight:500}
.approval-actions{display:flex;gap:8px;align-items:center}
.reject-input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius);font-size:12px;outline:none}
.reject-input:focus{border-color:var(--red)}

/* ===== NAFDAC ===== */
.nafdac-header{
  background:linear-gradient(135deg,rgba(46,204,113,.08),rgba(74,158,255,.05));
  border:1px solid rgba(46,204,113,.2);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;
  display:flex;align-items:center;gap:16px;
}
.nafdac-seal{font-size:40px;flex-shrink:0}
.nafdac-title{font-size:16px;font-weight:600;color:var(--green)}
.nafdac-ref{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono)}

/* ===== AUDIT ===== */
.audit-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(42,51,80,.4);
}
.audit-row:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.audit-time{font-family:var(--mono);font-size:11px;color:var(--text4);white-space:nowrap;width:130px;flex-shrink:0}
.audit-action{font-size:13px;color:var(--text2);flex:1}
.audit-user{font-size:11px;color:var(--text3);margin-top:2px}

/* ===== ROLE MATRIX ===== */
.matrix-table th{background:var(--bg4)}
.perm-check{font-size:14px;text-align:center}

/* ===== MISC ===== */
.inline-info{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(42,51,80,.4);font-size:13px}
.inline-info:last-child{border-bottom:none}
.ii-label{color:var(--text3)}
.ii-value{color:var(--text);font-family:var(--mono);font-weight:500}
.empty-state{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.separator{margin:20px 0;border:none;border-top:1px solid var(--border)}
.tag{display:inline-flex;padding:2px 6px;background:var(--bg4);color:var(--text3);border-radius:3px;font-size:10px;font-family:var(--mono)}
.flex-center{display:flex;align-items:center;justify-content:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}
.mb-4{margin-bottom:4px}
.mb-8{margin-bottom:8px}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}

/* ===== PRINT STYLES ===== */
@media print{
  .sidebar,.topbar,.btn{display:none!important}
  .page-content{padding:0}
  body{background:#fff;color:#000}
  .card{border:1px solid #ccc;break-inside:avoid}
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .sidebar{width:60px;min-width:60px}
  .sidebar-logo-title,.sidebar-logo-sub,.nav-item span:not(.nav-icon),.nav-badge,.nav-group-label,.sidebar-user-name,.sidebar-user-pos,.sidebar-user-roles{display:none}
  .nav-item{justify-content:center;padding:12px}
  .metrics-row{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3,.grid-2-3,.grid-3-2{grid-template-columns:1fr}
  .result-grid{grid-template-columns:1fr 1fr}
  .form-grid.cols-3,.form-grid.cols-4{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .metrics-row{grid-template-columns:1fr 1fr}
  .form-grid.cols-2,.form-grid.cols-3,.form-grid.cols-4{grid-template-columns:1fr}
  .result-grid{grid-template-columns:1fr}
  .login-card{padding:28px 20px;width:95%}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
/* ============================================================
   UGOMBA NOEL VEGETABLE OIL REFINERY — OPERATIONS PLATFORM
   v2.0.0 — Full deployable build
   Auth: SuperAdmin / Admin / Manager / Lab Tech / Secretary
   Modules: NaOH · Phosphoric · Vitamin A · Cost · Approval
            Inventory · Analytics · NAFDAC · Audit · Roles
   ============================================================ */

const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ── STORAGE ── */
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem('unr_'+k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem('unr_'+k, JSON.stringify(v)); } catch {} },
};

/* ── CONSTANTS ── */
const POSITION_LEVELS = { SuperAdmin:7, CEO:6, Director:5, Manager:4, Supervisor:3, 'Lab Technician':2, Secretary:1 };
const OIL_FACTORS = { 'Palm Oil':1.0, 'Soybean Oil':0.98, 'Sunflower Oil':0.96, 'Groundnut Oil':1.02, 'Canola Oil':0.97 };

const DEFAULT_PERMISSIONS = {
  full_access: {
    naoh_calculator:true, phosphoric_calculator:true, vitamina_calculator:true,
    cost_dashboard:true, analytics_dashboard:true, nafdac_report:true,
    inventory_management:true, audit_log:true, can_delete_batches:true, role_management:true,
    inflation_settings:true,
  },
  manager_role: {
    naoh_calculator:true, phosphoric_calculator:true, vitamina_calculator:true,
    cost_dashboard:true, analytics_dashboard:true, nafdac_report:true,
    inventory_management:true, audit_log:true, can_delete_batches:false, role_management:false,
    inflation_settings:false,
  },
  lab_tech_role: {
    naoh_calculator:true, phosphoric_calculator:true, vitamina_calculator:true,
    cost_dashboard:false, analytics_dashboard:false, nafdac_report:false,
    inventory_management:false, audit_log:false, can_delete_batches:false, role_management:false,
    inflation_settings:false,
  },
  secretary_role: {
    naoh_calculator:false, phosphoric_calculator:false, vitamina_calculator:false,
    cost_dashboard:false, analytics_dashboard:false, nafdac_report:true,
    inventory_management:false, audit_log:false, can_delete_batches:false, role_management:false,
    inflation_settings:false,
  },
};

const SEED_USERS = [
  { id:'u1', name:'Super Administrator', email:'superadmin@ugomba.com', password:'super123', role:'superadmin', position:'SuperAdmin', custom_role:'full_access', active:true, created:'2024-01-01' },
  { id:'u2', name:'Admin (CEO)', email:'admin@ugomba.com', password:'admin123', role:'admin', position:'CEO', custom_role:'full_access', active:true, created:'2024-01-01' },
  { id:'u3', name:'Production Manager', email:'manager@ugomba.com', password:'mgr123', role:'user', position:'Manager', custom_role:'manager_role', active:true, created:'2024-01-15' },
  { id:'u4', name:'Lab Technician', email:'lab@ugomba.com', password:'lab123', role:'user', position:'Lab Technician', custom_role:'lab_tech_role', active:true, created:'2024-02-01' },
  { id:'u5', name:'Secretary', email:'secretary@ugomba.com', password:'sec123', role:'user', position:'Secretary', custom_role:'secretary_role', active:true, created:'2024-02-15' },
];

const SEED_INVENTORY = [
  { id:'i1', chemical:'NaOH (Caustic Soda)', category:'Base Chemical', stock:450, unit:'kg', min_stock:50, cost_per_unit:1200, supplier:'Chemical Supplies Ltd' },
  { id:'i2', chemical:'Phosphoric Acid (85%)', category:'Acid', stock:120, unit:'L', min_stock:20, cost_per_unit:3500, supplier:'Agro Chemicals Nig' },
  { id:'i3', chemical:'Vitamin A Concentrate', category:'Fortifier', stock:8.5, unit:'kg', min_stock:1, cost_per_unit:85000, supplier:'Vitafoods Int\'l' },
  { id:'i4', chemical:'Bleaching Earth', category:'Adsorbent', stock:600, unit:'kg', min_stock:100, cost_per_unit:450, supplier:'Earth Sciences Ltd' },
  { id:'i5', chemical:'Filter Aid (Celite)', category:'Filtration', stock:200, unit:'kg', min_stock:30, cost_per_unit:800, supplier:'Industrial Filters Co' },
  { id:'i6', chemical:'Citric Acid', category:'Acid', stock:45, unit:'kg', min_stock:10, cost_per_unit:2200, supplier:'Chemical Supplies Ltd' },
];

const SEED_BATCHES = [
  { id:'B2024-001', type:'NaOH', date:'2024-04-01', operator:'Lab Technician', status:'approved', oil_volume:5000, oil_type:'Palm Oil', ffa:1.5, naoh_kg:7.52, approver:'Production Manager', approved_at:'2024-04-01' },
  { id:'B2024-002', type:'Phosphoric', date:'2024-04-02', operator:'Lab Technician', status:'approved', oil_volume:5000, oil_type:'Palm Oil', acid_ml:250, approver:'Production Manager', approved_at:'2024-04-02' },
  { id:'B2024-003', type:'VitaminA', date:'2024-04-03', operator:'Lab Technician', status:'approved', oil_volume:10000, target_conc:11, vitA_g:201.4, approver:'Production Manager', approved_at:'2024-04-03' },
  { id:'B2024-004', type:'NaOH', date:'2024-04-03', operator:'Lab Technician', status:'rejected', oil_volume:3000, oil_type:'Palm Oil', ffa:2.1, naoh_kg:6.3, approver:'Production Manager', rejection_reason:'Incorrect FFA reading — retest required' },
  { id:'B2024-005', type:'VitaminA', date:'2024-04-04', operator:'Lab Technician', status:'pending', oil_volume:8000, target_conc:11, vitA_g:161.1, approver:null },
];

const SEED_AUDIT = [
  { id:'a1', time:'2024-04-04 09:15', user:'Lab Technician', action:'Submitted VitaminA batch B2024-005 for approval (8000L oil, 161.1g Vit A)', level:'info', category:'batch' },
  { id:'a2', time:'2024-04-03 14:30', user:'Production Manager', action:'Approved batch B2024-003 — Vitamin A inventory deducted 0.201kg', level:'success', category:'approval' },
  { id:'a3', time:'2024-04-03 11:20', user:'Production Manager', action:'Rejected batch B2024-004 — Incorrect FFA reading', level:'warning', category:'approval' },
  { id:'a4', time:'2024-04-02 16:00', user:'Production Manager', action:'Approved batch B2024-002 — Phosphoric Acid inventory deducted 0.25L', level:'success', category:'approval' },
  { id:'a5', time:'2024-04-01 10:00', user:'Admin (CEO)', action:'System initialized — inflation rate set to 18%, margin 8%', level:'info', category:'system' },
];

/* ── HELPERS ── */
const fmt = (n, dec=2) => Number(n).toLocaleString('en-NG', {minimumFractionDigits:dec, maximumFractionDigits:dec});
const fmtN = (n) => Number(n).toLocaleString('en-NG', {minimumFractionDigits:0, maximumFractionDigits:0});
const fmtCur = (n) => '₦' + fmtN(n);
const posLevel = (pos) => POSITION_LEVELS[pos] || 0;
const newBatchId = () => 'B' + new Date().getFullYear() + '-' + String(Date.now()).slice(-4);
const nowStr = () => new Date().toISOString().slice(0,16).replace('T',' ');
const todayStr = () => new Date().toISOString().slice(0,10);

/* ── ROLE GUARD ── */
function canAccessPage(user, perm) {
  if (!user) return false;
  if (user.role === 'superadmin' || user.role === 'admin') return true;
  const perms = DEFAULT_PERMISSIONS[user.custom_role] || {};
  return !!perms[perm];
}
function canByPosition(user, minPos) {
  return posLevel(user?.position) >= posLevel(minPos);
}

/* ══════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(() => LS.get('session', null));
  const [page, setPage] = useState('dashboard');
  const [users, setUsers] = useState(() => LS.get('users', SEED_USERS));
  const [inventory, setInventory] = useState(() => LS.get('inventory', SEED_INVENTORY));
  const [batches, setBatches] = useState(() => LS.get('batches', SEED_BATCHES));
  const [auditLog, setAuditLog] = useState(() => LS.get('audit', SEED_AUDIT));
  const [inflationRate, setInflationRate] = useState(() => LS.get('inflation', 18));
  const [marginAbove, setMarginAbove] = useState(() => LS.get('margin', 8));
  const [loginError, setLoginError] = useState('');
  const [toast, setToast] = useState(null);

  // Persist state
  useEffect(() => { LS.set('users', users); }, [users]);
  useEffect(() => { LS.set('inventory', inventory); }, [inventory]);
  useEffect(() => { LS.set('batches', batches); }, [batches]);
  useEffect(() => { LS.set('audit', auditLog); }, [auditLog]);
  useEffect(() => { LS.set('inflation', inflationRate); }, [inflationRate]);
  useEffect(() => { LS.set('margin', marginAbove); }, [marginAbove]);
  useEffect(() => { if (user) LS.set('session', user); }, [user]);

  const showToast = (msg, type='success') => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 3000);
  };

  const addAudit = useCallback((action, level='info', category='system') => {
    const entry = { id:'a'+Date.now(), time:nowStr(), user:user?.name||'System', action, level, category };
    setAuditLog(prev => [entry, ...prev.slice(0,199)]);
  }, [user]);

  const login = (email, password) => {
    const u = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password && u.active);
    if (u) {
      setUser(u); setLoginError('');
      addAudit(`User "${u.name}" signed in`,'info','auth');
    } else {
      setLoginError('Invalid credentials or account inactive.');
    }
  };

  const logout = () => {
    addAudit(`User "${user?.name}" signed out`,'info','auth');
    setUser(null); LS.set('session', null);
    setPage('dashboard');
  };

  if (!user) return <LoginPage onLogin={login} error={loginError} users={users}/>;

  const pending = batches.filter(b => b.status === 'pending').length;
  const lowStockCount = inventory.filter(i => i.stock <= i.min_stock).length;

  const nav = [
    { key:'dashboard', label:'Dashboard', icon:'◈', section:'main' },
    { key:'naoh', label:'NaOH Calculator', icon:'⬡', section:'calc', perm:'naoh_calculator' },
    { key:'phosphoric', label:'Phosphoric Acid', icon:'⬡', section:'calc', perm:'phosphoric_calculator' },
    { key:'vitamina', label:'Vitamin A', icon:'⬡', section:'calc', perm:'vitamina_calculator' },
    { key:'cost', label:'Cost Analysis', icon:'◎', section:'ops', perm:'cost_dashboard' },
    { key:'approval', label:'Approval Queue', icon:'◉', section:'ops', badge: pending > 0 ? pending : null, badgeType:'danger' },
    { key:'inventory', label:'Inventory', icon:'▤', section:'ops', perm:'inventory_management', badge: lowStockCount > 0 ? lowStockCount : null, badgeType:'warn' },
    { key:'analytics', label:'Analytics', icon:'◱', section:'ops', perm:'analytics_dashboard' },
    { key:'nafdac', label:'NAFDAC Report', icon:'◫', section:'ops', perm:'nafdac_report' },
    { key:'audit', label:'Audit Log', icon:'◷', section:'admin', perm:'audit_log' },
    { key:'roles', label:'Role & User Mgmt', icon:'◈', section:'admin' },
  ];

  const sections = { main:[], calc:[], ops:[], admin:[] };
  nav.forEach(n => sections[n.section].push(n));
  const sectionLabels = { main:'', calc:'Calculators', ops:'Operations', admin:'Administration' };

  const renderPage = () => {
    const props = { user, batches, setBatches, inventory, setInventory, addAudit, showToast, users, setUsers, inflationRate, setInflationRate, marginAbove, setMarginAbove, auditLog };
    switch (page) {
      case 'dashboard':    return <Dashboard {...props} setPage={setPage}/>;
      case 'naoh':         return canAccessPage(user,'naoh_calculator') ? <NaOHCalc {...props}/> : <AccessDenied/>;
      case 'phosphoric':   return canAccessPage(user,'phosphoric_calculator') ? <PhosphoricCalc {...props}/> : <AccessDenied/>;
      case 'vitamina':     return canAccessPage(user,'vitamina_calculator') ? <VitaminACalc {...props}/> : <AccessDenied/>;
      case 'cost':         return canAccessPage(user,'cost_dashboard') ? <CostDashboard {...props}/> : <AccessDenied/>;
      case 'approval':     return <ApprovalQueue {...props}/>;
      case 'inventory':    return canAccessPage(user,'inventory_management') ? <InventoryPage {...props}/> : <AccessDenied/>;
      case 'analytics':    return canAccessPage(user,'analytics_dashboard') ? <AnalyticsDashboard {...props}/> : <AccessDenied/>;
      case 'nafdac':       return canAccessPage(user,'nafdac_report') ? <NAFDACReport {...props}/> : <AccessDenied/>;
      case 'audit':        return canAccessPage(user,'audit_log') ? <AuditLogPage {...props}/> : <AccessDenied/>;
      case 'roles':        return (user.role==='superadmin'||user.role==='admin') ? <RoleManagement {...props}/> : <AccessDenied/>;
      default:             return <Dashboard {...props} setPage={setPage}/>;
    }
  };

  const initials = user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const avatarColor = user.role==='superadmin'?'#e74c3c':user.role==='admin'?'#f5a623':user.role==='user'?'#4a9eff':'#8892aa';

  return (
    <div className="app-shell">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-hex">⬡</div>
          <div className="sidebar-logo-title">Ugomba Noel</div>
          <div className="sidebar-logo-sub">Vegetable Oil Refinery</div>
          <div className="sidebar-logo-version">v2.0.0 · Operations Platform</div>
        </div>

        {Object.entries(sections).map(([sec, items]) => (
          <div className="nav-group" key={sec}>
            {sectionLabels[sec] && <div className="nav-group-label">{sectionLabels[sec]}</div>}
            {items.map(n => (
              <div key={n.key}
                className={`nav-item${page===n.key?' active':''}`}
                onClick={() => setPage(n.key)}
                title={n.label}
              >
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
                {n.badge && <span className={`nav-badge${n.badgeType==='warn'?' warn':n.badgeType==='ok'?' ok':''}`}>{n.badge}</span>}
              </div>
            ))}
          </div>
        ))}

        <div className="sidebar-user">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div className="user-avatar" style={{background:avatarColor+'22',color:avatarColor,width:34,height:34,fontSize:12}}>{initials}</div>
            <div style={{minWidth:0}}>
              <div className="sidebar-user-name">{user.name}</div>
              <div className="sidebar-user-pos">{user.position}</div>
            </div>
          </div>
          <div className="sidebar-user-roles">
            <span className={`role-pill rp-${user.role}`}>{user.role.toUpperCase()}</span>
            <span className="role-pill rp-staff">{user.position}</span>
          </div>
          <button className="btn btn-ghost btn-sm btn-full" style={{marginTop:12}} onClick={logout}>↪ Sign Out</button>
        </div>
      </aside>

      {/* MAIN */}
      <div className="main-area">
        <header className="topbar">
          <span className="topbar-page-title">{nav.find(n=>n.key===page)?.label || 'Dashboard'}</span>

          <div className="topbar-right">
            {pending > 0 && (
              <div className="topbar-alert warn" style={{cursor:'pointer'}} onClick={()=>setPage('approval')}>
                ⚠ {pending} pending
              </div>
            )}
            {lowStockCount > 0 && (
              <div className="topbar-alert danger" style={{cursor:'pointer'}} onClick={()=>setPage('inventory')}>
                ▼ {lowStockCount} low stock
              </div>
            )}
            <div className="topbar-user-chip" onClick={logout} title="Click to sign out">
              <div className="online-dot"/>
              <div className="user-avatar" style={{background:avatarColor+'22',color:avatarColor,width:22,height:22,fontSize:10}}>{initials}</div>
              <span style={{color:'var(--text2)'}}>{user.name.split(' ')[0]}</span>
              <span className={`role-pill rp-${user.role}`} style={{fontSize:9}}>{user.role}</span>
            </div>
          </div>
        </header>

        <main className="page-content">
          {renderPage()}
        </main>
      </div>

      {/* TOAST */}
      {toast && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:2000,
          background: toast.type==='success'?'var(--green)':toast.type==='error'?'var(--red)':'var(--accent)',
          color: toast.type==='success'||toast.type==='error'?'#fff':'#0f1117',
          padding:'10px 18px', borderRadius:'var(--radius-lg)',
          boxShadow:'var(--shadow)', fontSize:13, fontWeight:500,
          animation:'slideUp .2s',
        }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════════════════════════ */
function LoginPage({ onLogin, error, users }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const quick = (e, p) => { setEmail(e); setPwd(p); setTimeout(()=>onLogin(e,p),50); };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-header">
          <span className="login-hex">⬡</span>
          <div className="login-title">Ugomba Noel</div>
          <div className="login-subtitle">Vegetable Oil Refinery — Operations Platform</div>
        </div>

        <div className="field mb-12">
          <label>Email Address</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" autoFocus/>
        </div>

/* ══════════════════════════════════════════════════════════
   NAOH CALCULATOR
══════════════════════════════════════════════════════════ */
function NaOHCalc({ user, batches, setBatches, inventory, setInventory, addAudit, showToast }) {
  const [oilVol, setOilVol] = useState('');
  const [ffaPct, setFfaPct] = useState('');
  const [oilType, setOilType] = useState('Palm Oil');
  const [result, setResult] = useState(null);
  const [submitted, setSubmitted] = useState(false);

  const calculate = () => {
    const vol = parseFloat(oilVol), ffa = parseFloat(ffaPct);
    if (!vol || !ffa || vol <= 0 || ffa <= 0) return;
    const factor = OIL_FACTORS[oilType] || 1;
    const naoh_theoretical = (vol * ffa * 0.142 * factor) / 1000;
    const naoh_excess = naoh_theoretical * 1.15;
    const lye_volume = naoh_excess / 0.16;
    const water_volume = lye_volume - naoh_excess;
    const temp_range = '55–65°C';
    const mixing_time = '20–30 min';
    setResult({ naoh_theoretical, naoh_excess, lye_volume, water_volume, temp_range, mixing_time, vol, ffa, oilType });
    setSubmitted(false);
  };

  const submit = () => {
    if (!result) return;
    const id = newBatchId();
    const batch = { id, type:'NaOH', date:todayStr(), operator:user.name, status:'pending', oil_volume:result.vol, oil_type:result.oilType, ffa:result.ffa, naoh_kg:parseFloat(result.naoh_excess.toFixed(3)), approver:null };
    setBatches(p=>[...p,batch]);
    addAudit(`Submitted NaOH batch ${id} for approval — ${result.vol}L ${oilType} @ ${result.ffa}% FFA, NaOH: ${result.naoh_excess.toFixed(3)}kg`,'info','batch');
    setSubmitted(true);
    showToast(`Batch ${id} submitted for approval`);
  };

  const histNaOH = batches.filter(b=>b.type==='NaOH');

  return (
    <div>
      <div className="page-heading mb-4">NaOH Dosage Calculator</div>
      <div className="page-sub mb-16">Calculates caustic soda (NaOH) required for chemical refining of vegetable oil based on FFA content</div>

      <div className="card">
        <div className="section-title">Calculation Parameters</div>
        <div className="form-grid cols-4 mb-16">
          <div className="field">
            <label>Oil Volume (Litres)</label>
            <input type="number" value={oilVol} onChange={e=>setOilVol(e.target.value)} placeholder="e.g. 5000" min="1"/>
          </div>
          <div className="field">
            <label>FFA Content (%)</label>
            <input type="number" step="0.01" value={ffaPct} onChange={e=>setFfaPct(e.target.value)} placeholder="e.g. 1.5" min="0.01" max="20"/>
            <span className="field-hint">Free Fatty Acid percentage from titration</span>
          </div>
          <div className="field">
            <label>Oil Type</label>
            <select value={oilType} onChange={e=>setOilType(e.target.value)}>
              {Object.keys(OIL_FACTORS).map(o=><option key={o}>{o}</option>)}
            </select>
          </div>
          <div className="field">
            <label>&nbsp;</label>
            <button className="btn btn-primary" onClick={calculate} disabled={!oilVol||!ffaPct}>Calculate Dosage</button>
          </div>
        </div>

        {result && (
          <div className="result-box">
            <div className="result-box-title">NaOH Dosage Results — {fmtN(result.vol)}L {result.oilType} @ {result.ffa}% FFA</div>
            <div className="result-grid">
              <div className="result-item">
                <div className="ri-label">Theoretical NaOH</div>
                <div className="ri-value">{fmt(result.naoh_theoretical,3)}<span className="ri-unit">kg</span></div>
              </div>
              <div className="result-item" style={{borderColor:'var(--accent)',border:'1px solid rgba(245,166,35,.3)'}}>
                <div className="ri-label">NaOH Required (+15% excess)</div>
                <div className="ri-value" style={{color:'var(--accent)'}}>{fmt(result.naoh_excess,3)}<span className="ri-unit">kg</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Lye Solution Volume</div>
                <div className="ri-value">{fmt(result.lye_volume,2)}<span className="ri-unit">L</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Water Required</div>
                <div className="ri-value">{fmt(result.water_volume,2)}<span className="ri-unit">L</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Temperature Range</div>
                <div className="ri-value" style={{fontSize:14}}>{result.temp_range}</div>
              </div>
              <div className="result-item">
                <div className="ri-label">Mixing Time</div>
                <div className="ri-value" style={{fontSize:14}}>{result.mixing_time}</div>
              </div>
            </div>
            <div className="alert alert-info" style={{marginBottom:12}}>
              <span className="alert-icon">ℹ</span>
              Dissolve {fmt(result.naoh_excess,3)}kg NaOH in {fmt(result.water_volume,2)}L water to prepare 16% w/v lye solution. Add slowly to oil at {result.temp_range} with continuous agitation.
            </div>
            {submitted
              ? <div className="alert alert-success"><span className="alert-icon">✓</span>Batch submitted for manager approval. Check the Approval Queue.</div>
              : <button className="btn btn-primary" onClick={submit}>Submit for Approval</button>
            }
          </div>
        )}
      </div>

      <div className="card">
        <div className="section-title">NaOH Batch History ({histNaOH.length})</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Batch ID</th><th>Date</th><th>Oil Type</th><th>Volume (L)</th><th>FFA (%)</th><th>NaOH (kg)</th><th>Operator</th><th>Status</th><th>Approver</th></tr></thead>
            <tbody>
              {[...histNaOH].reverse().map(b=>(
                <tr key={b.id}>
                  <td className="td-mono">{b.id}</td>
                  <td className="td-muted">{b.date}</td>
                  <td>{b.oil_type||'—'}</td>
                  <td className="td-mono">{fmtN(b.oil_volume)}</td>
                  <td className="td-mono">{b.ffa}</td>
                  <td className="td-mono">{b.naoh_kg}</td>
                  <td>{b.operator}</td>
                  <td><span className={`badge badge-${b.status}`}>{b.status.toUpperCase()}</span></td>
                  <td className="td-muted">{b.approver||'—'}</td>
                </tr>
              ))}
              {histNaOH.length===0 && <tr><td colSpan={9} className="empty-state">No NaOH batches yet</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   PHOSPHORIC ACID CALCULATOR
══════════════════════════════════════════════════════════ */
function PhosphoricCalc({ user, batches, setBatches, inventory, setInventory, addAudit, showToast }) {
  const [oilVol, setOilVol] = useState('');
  const [ironPpm, setIronPpm] = useState('2');
  const [result, setResult] = useState(null);
  const [submitted, setSubmitted] = useState(false);

  const calculate = () => {
    const vol = parseFloat(oilVol), iron = parseFloat(ironPpm)||2;
    if (!vol||vol<=0) return;
    const oil_tons = (vol * 0.92) / 1000;
    const acid_ml_per_ton = (iron * 0.8 + 1.2) * 10;
    const acid_total_ml = acid_ml_per_ton * oil_tons;
    const acid_diluted_ml = acid_total_ml / 0.85;
    const water_ml = acid_diluted_ml - acid_total_ml;
    setResult({ acid_total_ml, acid_diluted_ml, water_ml, oil_tons, vol });
    setSubmitted(false);
  };

  const submit = () => {
    if (!result) return;
    const id = newBatchId();
    const batch = { id, type:'Phosphoric', date:todayStr(), operator:user.name, status:'pending', oil_volume:result.vol, acid_ml:parseFloat(result.acid_total_ml.toFixed(1)), approver:null };
    setBatches(p=>[...p,batch]);
    addAudit(`Submitted Phosphoric batch ${id} for approval — ${result.vol}L oil, ${result.acid_total_ml.toFixed(1)}mL H₃PO₄`,'info','batch');
    setSubmitted(true);
    showToast(`Batch ${id} submitted`);
  };

  const hist = batches.filter(b=>b.type==='Phosphoric');

  return (
    <div>
      <div className="page-heading mb-4">Phosphoric Acid Degumming Calculator</div>
      <div className="page-sub mb-16">Calculates H₃PO₄ (85%) dosage for degumming and removing trace metals from crude oil</div>

      <div className="card">
        <div className="section-title">Calculation Parameters</div>
        <div className="form-row">
          <div className="field">
            <label>Oil Volume (Litres)</label>
            <input type="number" value={oilVol} onChange={e=>setOilVol(e.target.value)} placeholder="e.g. 5000"/>
          </div>
          <div className="field">
            <label>Iron Content (ppm)</label>
            <input type="number" step="0.1" value={ironPpm} onChange={e=>setIronPpm(e.target.value)} placeholder="default: 2 ppm"/>
            <span className="field-hint">From metals analysis; default 2ppm if unknown</span>
          </div>
          <div className="field" style={{maxWidth:160,minWidth:120}}>
            <label>&nbsp;</label>
            <button className="btn btn-primary" onClick={calculate} disabled={!oilVol}>Calculate</button>
          </div>
        </div>

        {result && (
          <div className="result-box">
            <div className="result-box-title">Phosphoric Acid Degumming Parameters — {fmtN(result.vol)}L Oil</div>
            <div className="result-grid">
              <div className="result-item" style={{border:'1px solid rgba(245,166,35,.3)'}}>
                <div className="ri-label">H₃PO₄ Required (85%)</div>
                <div className="ri-value" style={{color:'var(--accent)'}}>{fmt(result.acid_total_ml,1)}<span className="ri-unit">mL</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Diluted Acid Volume</div>
                <div className="ri-value">{fmt(result.acid_diluted_ml,1)}<span className="ri-unit">mL</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Water for Dilution</div>
                <div className="ri-value">{fmt(result.water_ml,1)}<span className="ri-unit">mL</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Oil Mass</div>
                <div className="ri-value">{fmt(result.oil_tons,3)}<span className="ri-unit">tonnes</span></div>
              </div>
              <div className="result-item">
                <div className="ri-label">Contact Time</div>
                <div className="ri-value" style={{fontSize:14}}>15–20 min</div>
              </div>
              <div className="result-item">
                <div className="ri-label">Temperature</div>
                <div className="ri-value" style={{fontSize:14}}>60–70°C</div>
              </div>
            </div>
            <div className="alert alert-info" style={{marginBottom:12}}>
              <span className="alert-icon">ℹ</span>
              Dilute {fmt(result.acid_total_ml,1)}mL H₃PO₄ with {fmt(result.water_ml,1)}mL water before addition. Add at 60–70°C with vigorous agitation. Stir for 15–20 min before centrifugation.
            </div>
            {submitted
              ? <div className="alert alert-success"><span className="alert-icon">✓</span>Submitted for approval.</div>
              : <button className="btn btn-primary" onClick={submit}>Submit for Approval</button>
            }
          </div>
        )}
      </div>

      <div className="card">
        <div className="section-title">Phosphoric Batch History ({hist.length})</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Batch ID</th><th>Date</th><th>Oil Vol (L)</th><th>Acid (mL)</th><th>Operator</th><th>Status</th></tr></thead>
            <tbody>
              {[...hist].reverse().map(b=>(
                <tr key={b.id}>
                  <td className="td-mono">{b.id}</td>
                  <td className="td-muted">{b.date}</td>
                  <td className="td-mono">{fmtN(b.oil_volume)}</td>
                  <td className="td-mono">{b.acid_ml}</td>
                  <td>{b.operator}</td>
                  <td><span className={`badge badge-${b.status}`}>{b.status.toUpperCase()}</span></td>
                </tr>
              ))}
              {hist.length===0&&<tr><td colSpan={6} className="empty-state">No phosphoric batches yet</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   VITAMIN A CALCULATOR
══════════════════════════════════════════════════════════ */
function VitaminACalc({ user, batches, setBatches, inventory, setInventory, addAudit, showToast }) {
  const [oilVol, setOilVol] = useState('');
  const [targetConc, setTargetConc] = useState('11');
  const [stockConc, setStockConc] = useState('500000');
  const [result, setResult] = useState(null);
  const [submitted, setSubmitted] = useState(false);

  const calculate = () => {
    const vol = parseFloat(oilVol), target = parseFloat(targetConc), stock = parseFloat(stockConc);
    if (!vol||!target||!stock) return;
    const oil_kg = vol * 0.92;
    const total_IU = oil_kg * target * 1000;
    const vitA_g = (total_IU / stock) * 1000;
    const vitA_g_excess = vitA_g * 1.10;
    const isCompliant = target >= 11;
    setResult({ vitA_g, vitA_g_excess, total_IU, oil_kg, target, isCompliant, vol });
    setSubmitted(false);

  const submit = () => {
    if (!result) return;
    const id = newBatchId();
    const batch = { id, type:'VitaminA', date:todayStr(), operator:user.name, status:'pending', oil_volume:result.vol, target_conc:result.target, vitA_g:parseFloat(result.vitA_g_excess.toFixed(2)), approver:null };

    <div>

        <div className="section-title">Calculation Parameters</div>

          <div className="field">
            <label>Target Conc. (IU/g)</label>
            <input type="number" step="0.5" value={targetConc} onChange={e=>setTargetConc(e.target.value)}/>
            <span className="field-hint">Min 11 IU/g for NAFDAC compliance</span>
          </div>
          <div className="field">
            <label>Stock Concentrate (IU/g)</label>
            <input type="number" value={stockConc} onChange={e=>setStockConc(e.target.value)}/>

              <div className="result-box-title" style={{margin:0}}>Vitamin A Fortification Results</div>
              <span className={`result-compliance ${result.isCompliant?'rc-pass':'rc-fail'}`}>
